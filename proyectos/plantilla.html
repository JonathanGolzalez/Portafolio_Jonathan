<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vegánimo | Proyecto</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="/proyectos/estilo-proy.css">
</head>
<body class="dark-theme">

    <header class="navegacion-proyecto">
        <div class="nav-container">
            <a href="../index.html" class="btn-regresar" title="Volver al portafolio">
                <i class="fas fa-arrow-left"></i>
            </a>
            <div class="logo">Logo</div>
            <a class="idioma-pill" id="btnIdioma">ES</a>
        </div>
    </header>

    <main class="contenedor-proyecto">
        <header class="proyecto-header">
            <div class="titulo-grupo">
                <h1 class="proyecto-titulo">Vegánimo</h1>
                <div class="linea-decorativa"></div>
            </div>
            <span class="proyecto-rol">QA & FrontEnd Developer</span>
        </header>

        <section class="banner-principal">
            <img src="/proyectos/contabilidad/img-calculadora.jpeg" alt="Banner Vegánimo" class="img-fluida">
        </section>

        <div class="grid-info">
            <section class="info-seccion">
                <h3 class="subtitulo-proyecto"><i class="fas fa-code"></i> Tecnologías</h3>
                <div class="tags-contenedor">
                    <span class="tag">HTML5</span>
                    <span class="tag">CSS3</span>
                    <span class="tag">JavaScript</span>
                </div>
            </section>

            <section class="info-seccion">
                <h3 class="subtitulo-proyecto"><i class="fas fa-check-circle"></i> Competencias</h3>
                <div class="tags-contenedor">
                    <span class="tag-alt">UI/UX Design</span>
                    <span class="tag-alt">Responsive Design</span>
                    <span class="tag-alt">Git/GitHub</span>
                </div>
            </section>
        </div>

        <section class="galeria-pruebas">
            <div class="foto-marco"><img src="/proyectos/contabilidad/1.jpg" class="img-galeria"></div>
            <div class="foto-marco"><img src="/proyectos/contabilidad/2.jpg" class="img-galeria"></div>
            <div class="foto-marco"><img src="/proyectos/contabilidad/3.jpg" class="img-galeria"></div>
        </section>

        <footer class="proyecto-footer">
            <a href="https://github.com/tu-usuario" target="_blank" class="btn-github-premium">
                <i class="fab fa-github"></i> Ver Código en GitHub
            </a>
        </footer>
    </main>

    <script src="../../port-idioma.js"></script>
</body>
</html>
