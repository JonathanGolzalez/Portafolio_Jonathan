<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title data-es="Sivar Tours" data-en="Sivar Tours">Sivar Tours</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <link rel="stylesheet" href="/proyectos/estilo-proy.css" />
  </head>
  <body class="dark-theme">
    <header class="navegacion-proyecto">
      <div class="nav-container">
        <a
          href="../../index.html"
          class="btn-regresar"
          title="Volver al portafolio"
        >
          <i class="fas fa-arrow-left"></i>
        </a>
        <div class="logo"><img src="/images/logo/logo-verde.svg" alt="" /></div>
        <!-- boton idioma -->
        <a class="idioma-pill" id="btnIdioma">
          <span class="estado-indicador"></span>
          <span class="idioma-text">ES</span>
        </a>
      </div>
    </header>

    <main class="contenedor-proyecto">
      <header class="proyecto-header">
        <div class="titulo-grupo">
          <h1 class="proyecto-titulo" data-es="Sivar" data-en="Sivar">Sivar</h1>
          <div class="linea-decorativa"></div>
        </div>
        <span
          class="proyecto-rol"
          data-es="Desarrollador Backend"
          data-en="Backend Developer"
          >Backend Developer</span
        >
      </header>

      <section class="banner-principal">
        <img
          src="/proyectos/sivar-tours/img-sivar.jpg"
          alt="Banner Vegánimo"
          class="img-fluida"
        />
      </section>

      <div class="grid-info">
        <section class="info-seccion">
          <h3
            class="subtitulo-proyecto"
            data-es="Tecnologías"
            data-en="Technologies"
          >
            <i class="fas fa-code"></i> Technologies
          </h3>
          <div class="tags-contenedor">
            <span class="tag">HTML5</span>
            <span class="tag">CSS3</span>
            <span class="tag">JavaScript</span>
            <span class="tag">PHP</span>
          </div>
        </section>

        <section class="info-seccion">
          <h3
            class="subtitulo-proyecto"
            data-es="Competencias"
            data-en="Skills"
          >
            <i class="fas fa-check-circle"></i> Skills
          </h3>
          <div class="tags-contenedor">
            <span
              class="tag-alt"
              data-es="Designar las tareas del proyecto"
              data-en="Assign project tasks"
              >Assign project tasks</span
            >
            <span
              class="tag-alt"
              data-es="Organización del proyecto de Azure"
              data-en="Azure project organization"
              >Azure project organization</span
            >
            <span
              class="tag-alt"
              data-es="Aplicación de metodologías ágiles"
              data-en="Agile methodologies implementation"
              >Agile methodologies implementation</span
            >
            <span class="tag-alt">Git/GitHub</span>
          </div>
        </section>
      </div>

      <section class="galeria-pruebas">
        <div class="foto-marco">
          <img src="/proyectos/sivar-tours/img-sivar.jpg" class="img-galeria" />
        </div>
        <div class="foto-marco">
          <img src="/proyectos/sivar-tours/" class="img-galeria" />
        </div>
        <div class="foto-marco">
          <img src="/proyectos/sivar-tours/" class="img-galeria" />
        </div>
      </section>

      <footer class="proyecto-footer">
        <a
          href=""
          target="_blank"
          class="btn-github-premium"
          data-es="Ver Código en GitHub"
          data-en="View Code on GitHub"
        >
          <i class="fab fa-github"></i> View Code on GitHub
        </a>
      </footer>
    </main>

    <script src="../../port-idioma.js"></script>
  </body>
</html>
