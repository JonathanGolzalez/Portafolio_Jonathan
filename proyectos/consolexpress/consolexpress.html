<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<body class="dark-theme">

    <header class="navegacion-proyecto">

    <main class="contenedor-proyecto">

            <div class="titulo-grupo">

            <span class="proyecto-rol" data-es="Desarrollador Backend" data-en="Backend Developer">Backend Developer</span>

        <section class="banner-principal">

        <div class="grid-info">
            <section class="info-seccion">
                <h3 class="subtitulo-proyecto" data-es="Tecnologías" data-en="Technologies">

                </h3>
                <div class="tags-contenedor">

                    <span class="tag">CSS</span>

                    <span class="tag">Django</span>

            <section class="info-seccion">
                <h3 class="subtitulo-proyecto" data-es="Competencias" data-en="Skills">

                </h3>
                <div class="tags-contenedor">
                    <span class="tag-alt" data-es="Desarrollo de backend para la compra de consolas" data-en="Backend development for console purchasing">Backend development for console purchasing</span>
                    <span class="tag-alt" data-es="Lógica de gestión de productos (consolas)" data-en="Product management logic (consoles)">Product management logic (consoles)</span>
                    <span class="tag-alt" data-es="Procesamiento de pedidos" data-en="Order processing">Order processing</span>
                    <span class="tag-alt" data-es="Validación de datos en el sistema de compra" data-en="Data validation in the purchasing system">Data validation in the purchasing system</span>
                    <span class="tag-alt" data-es="Integración del flujo de compra" data-en="Purchase flow integration">Purchase flow integration</span>
                </div>
            </section>
        </div>

        <section class="galeria-pruebas">
            <div class="foto-marco"><img src="/proyectos/consolexpress/img-portcons.png" class="img-galeria"></div>
            <div class="foto-marco"><img src="/proyectos/consolexpress/img-pprincipal.png" class="img-galeria"></div>
            <div class="foto-marco"><img src="/proyectos/consolexpress/img-compra.png" class="img-galeria"></div>
            <div class="foto-marco"><img src="/proyectos/consolexpress/img-chatbot.png" class="img-galeria"></div>

        <footer class="proyecto-footer">
            <a href="https://github.com/RachellRG29/PrograIII_2024_Semi/tree/ConsoleXpress_Tienda" target="_blank" class="btn-github-premium" data-es="Ver Código en GitHub" data-en="View Code on GitHub">
